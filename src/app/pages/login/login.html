<div class="login-page">
  <div class="login-card">

    <div class="logo">
      <span class="logo-text">Forms</span>
      <span class="logo-slash">//</span>
      <span class="logo-text">CUSTOMERS</span>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="username"></label>
        <div class="input-wrapper">
          <img src="../../../assets/id.png" alt="user" class="input-icon">
          <input
            id="username"
            type="text"
            formControlName="username"
            placeholder="Identifiant"
            [class.input-error]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
          />
        </div>
        <span class="error" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          Identifiant obligatoire
        </span>
      </div>

      <div class="form-group">
        <label for="password"></label>
        <div class="input-wrapper">
          <img src="../../../assets/mp.png" alt="password" class="input-icon">
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Mot de passe"
            [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
        </div>
        <span class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Mot de passe obligatoire
        </span>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">
        Se connecter
      </button>

    </form>
  </div>
</div>
