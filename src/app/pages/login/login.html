<div class="login-page">
  <div class="login-card">

   <div class="logo">
  <span class="logo-text">F<span class="o">O</span>RM<span class="s">S</span></span>
  <span class="logo-slash">//</span>
  <span class="logo-text">CUST<span class="o">O</span>M<span class="e">E</span>R</span>
</div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

      <div class="form-group">
        <label for="email"></label>
        <div class="input-wrapper">
          <img src="../../../assets/id.png" alt="user" class="input-icon">
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="Identifiant"
            [class.input-error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
          />
        </div>
        <span class="error" *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
          Email invalide
        </span>
      </div>

      <div class="form-group">
        <label for="password"></label>
        <div class="input-wrapper">
          <img src="../../../assets/mp.png" alt="password" class="input-icon">
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="Mot de passe"
            [class.input-error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
          />
        </div>
        <span class="error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Mot de passe obligatoire
        </span>
      </div>

      <button type="submit" [disabled]="loginForm.invalid">
        Se connecter
      </button>

    </form>
  </div>
</div>
