<div class="grid-container">
 <div class="grid-toolbar">
    <div class="toolbar-icon">
      <div class="file-icon">
        <div class="file-corner"></div>
        <div class="file-arrow">→</div>
      </div>
</div>

  <button class="btn-nouveau-contact" (click)="openAddDialog()">
    <span class="btn-icon">👤+</span>
    Nouveau contact
  </button>
</div>
@if (showGrid) {
  <kendo-grid [data]="contacts" (edit)="editHandler($event)" (remove)="removeHandler($event)">
    <kendo-grid-column field="societe" title="Société" [width]="60"></kendo-grid-column>
    <kendo-grid-column field="nom" title="Nom" [width]="60"></kendo-grid-column>
    <kendo-grid-column field="prenom" title="Prénom" [width]="60"></kendo-grid-column>
    <kendo-grid-column field="pays" title="Pays" [width]="60"></kendo-grid-column>

    <kendo-grid-command-column title="Action" [width]="30">
      <ng-template kendoGridCellTemplate>
        <div style="display: flex; justify-content: center; align-items: center; gap: 10px">
          <button
            kendoGridEditCommand
            themeColor="base"
            [svgIcon]="editIcon"
            aria-label="Éditer"
          ></button>
          <button
            kendoGridRemoveCommand
            themeColor="error"
            [svgIcon]="deleteIcon"
            aria-label="Supprimer"
          ></button>
        </div>
      </ng-template>
      <ng-template kendoGridEditTemplate>
        <button kendoGridSaveCommand themeColor="primary">Sauvegarder</button>
        <button kendoGridCancelCommand themeColor="base">Annuler</button>
      </ng-template>
    </kendo-grid-command-column>
  </kendo-grid>
}
</div>
<!-- ✅ noms alignés avec contact.ts -->
@if (isDialogOpen) {
  <kendo-dialog
    [title]="isNewContact ? 'Nouveau Contact' : 'Modifier Contact'"
    [minWidth]="300"
    [width]="500"
    (close)="onDialogCancel()"
  >
    <app-contact
      [isNew]="isNewContact"
      [contact]="selectedContact"
      (save)="onContactSaved($event)"
      (cancel)="onDialogCancel()"
    >
    </app-contact>
  </kendo-dialog>
}
